<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ffffff; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; gap: 16px; flex-wrap: wrap; padding: 28px 20px; }
.col { display: flex; flex-direction: column; gap: 14px; }
.card { background: #ffffff; border-radius: 18px; padding: 20px; color: #111827; box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.07); border: 1px solid #e5e7eb; }
.label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #9ca3af; margin-bottom: 14px; font-weight: 700; }

/* Weather */
.weather-card { width: 285px; }
.weather-main { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.weather-icon { font-size: 44px; line-height: 1; }
.temp { font-size: 48px; font-weight: 700; letter-spacing: -2px; color: #111827; }
.condition { font-size: 13px; color: #374151; margin-bottom: 14px; text-transform: capitalize; }
.forecast { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #f3f4f6; padding-top: 12px; gap: 2px; }
.day { text-align: center; }
.day-name { font-size: 8px; color: #6b7280; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; }
.day-icon { font-size: 14px; margin-bottom: 3px; }
.day-hi { color: #111827; font-weight: 600; font-size: 10px; display: block; }
.day-lo { color: #9ca3af; font-size: 10px; display: block; }

/* SPX */
.spx-card { width: 285px; }
.spx-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
.spx-price { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: #111827; }
.spx-change { font-size: 12px; font-weight: 600; }
.spx-chart-wrap { margin-top: 10px; margin-bottom: 6px; }
.spx-range { font-size: 10px; color: #9ca3af; display: flex; justify-content: space-between; letter-spacing: 0.3px; }

/* Clock */
.clock-card { width: 285px; }
.clock-face { display: flex; justify-content: center; margin-bottom: 10px; }
.date-display { font-size: 11px; color: #374151; text-align: center; }
.tz-label { font-size: 9px; color: #9ca3af; margin-top: 4px; letter-spacing: 1.5px; font-weight: 700; text-align: center; text-transform: uppercase; }

/* Dodgers */
.dodgers-card { width: 285px; }
.game-teams { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.team { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.team-logo { width: 42px; height: 42px; object-fit: contain; }
.team-abbr { font-size: 9px; font-weight: 700; color: #374151; letter-spacing: 0.5px; }
.team-record { font-size: 9px; color: #9ca3af; letter-spacing: 0.3px; }
.vs-scores { text-align: center; flex: 1; }
.score-line { display: flex; align-items: center; justify-content: center; gap: 8px; }
.score-num { font-size: 34px; font-weight: 700; color: #111827; letter-spacing: -1px; }
.score-sep { font-size: 18px; color: #d1d5db; }
.game-status { font-size: 10px; color: #6b7280; text-align: center; border-top: 1px solid #f3f4f6; padding-top: 8px; font-weight: 600; letter-spacing: 0.5px; margin-top: 8px; }
.result-badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
.win { background: #dcfce7; color: #166534; }
.loss { background: #fee2e2; color: #991b1b; }

/* Scores */
.scores-card { width: 285px; }
.sport-section+.sport-section { border-top: 1px solid #f3f4f6; margin-top: 11px; padding-top: 11px; }
.sport-lbl { font-size: 8px; color: #9ca3af; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 7px; }
.sg-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.sg-row+.sg-row { border-top: 1px solid #f9fafb; }
.sg-main { display: flex; align-items: center; gap: 5px; flex: 1; }
.sg-abbr { font-size: 11px; font-weight: 700; color: #6b7280; min-width: 24px; }
.sg-abbr-w { color: #111827; }
.sg-num { font-size: 14px; font-weight: 700; color: #111827; min-width: 16px; text-align: center; }
.sg-dot { font-size: 10px; color: #d1d5db; }
.sg-at { font-size: 10px; color: #9ca3af; }
.sg-right { text-align: right; }
.sg-badge { display: inline-block; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.3px; white-space: nowrap; }
.sg-live { background: #dcfce7; color: #15803d; }
.sg-final { background: #f3f4f6; color: #6b7280; }
.sg-sched { background: #eff6ff; color: #3b82f6; }
.sg-detail { font-size: 9px; color: #9ca3af; margin-top: 1px; white-space: nowrap; }
.sg-news-hl { font-size: 11px; color: #374151; line-height: 1.4; padding: 2px 0; }
.sg-news-tag { font-size: 8px; color: #9ca3af; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.sg-bullet { font-size: 11px; color: #374151; line-height: 1.4; padding: 4px 0 4px 12px; position: relative; }
.sg-bullet+.sg-bullet { border-top: 1px solid #f9fafb; }
.sg-bullet::before { content: '•'; position: absolute; left: 0; color: #9ca3af; font-size: 10px; }
</style>
</head>
<body>

<!-- Column 1: Weather + S&P 500 -->
<div class="col">
  <div class="card weather-card">
    <div class="label">Los Angeles Weather</div>
    <div class="weather-main">
      <div class="weather-icon" id="icon">...</div>
      <div class="temp" id="temp">--</div>
    </div>
    <div class="condition" id="condition">Loading...</div>
    <div class="forecast" id="forecast"></div>
  </div>
  <div class="card spx-card">
    <div class="label">S&amp;P 500</div>
    <div class="spx-top">
      <div class="spx-price" id="spx-price">--</div>
      <div class="spx-change" id="spx-change" style="color:#9ca3af">Loading...</div>
    </div>
    <div class="spx-chart-wrap"><canvas id="spx-chart" width="245" height="72"></canvas></div>
    <div class="spx-range"><span id="spx-low">L: --</span><span id="spx-high">H: --</span></div>
  </div>
</div>

<!-- Column 2: Clock + Dodgers -->
<div class="col">
  <div class="card clock-card">
    <div class="label">Los Angeles Time</div>
    <div class="clock-face"><canvas id="clock" width="186" height="186"></canvas></div>
    <div class="date-display" id="date">Loading...</div>
    <div class="tz-label" id="tz-label">PDT &middot; UTC-7</div>
  </div>
  <div class="card dodgers-card">
    <div class="label">LA Dodgers</div>
    <div id="dodgers-content"><div style="color:#9ca3af;font-size:12px">Loading...</div></div>
  </div>
</div>

<!-- Column 3: Sports Scores -->
<div class="col">
  <div class="card scores-card">
    <div class="label">Scores &amp; Updates</div>
    <div id="scores-content"><div style="color:#9ca3af;font-size:12px">Loading...</div></div>
  </div>
</div>

<script>
var WMO={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
var EM={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'❄️',73:'❄️',75:'❄️',80:'🌦',81:'🌦',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

fetch('https://api.open-meteo.com/v1/forecast?latitude=34.0522&longitude=-118.2437&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles&forecast_days=8')
.then(function(r){return r.json();}).then(function(d){
  var cur=d.current,code=cur.weather_code;
  document.getElementById('icon').textContent=EM[code]||'🌡';
  document.getElementById('temp').textContent=Math.round(cur.temperature_2m)+'°F';
  document.getElementById('condition').textContent=WMO[code]||'Unknown';
  var fc=d.daily,out='';
  for(var i=1;i<8;i++){
    var day=new Date(fc.time[i]+'T12:00:00');
    out+='<div class="day"><div class="day-name">'+DAYS[day.getDay()]+'</div><div class="day-icon">'+(EM[fc.weather_code[i]]||'🌡')+'</div><span class="day-hi">'+Math.round(fc.temperature_2m_max[i])+'°</span><span class="day-lo">'+Math.round(fc.temperature_2m_min[i])+'°</span></div>';
  }
  document.getElementById('forecast').innerHTML=out;
}).catch(function(){document.getElementById('condition').textContent='Weather unavailable';});

function drawClock(){
  var canvas=document.getElementById('clock');
  var ctx=canvas.getContext('2d');
  var now=new Date();
  var tparts=new Intl.DateTimeFormat('en-US',{timeZone:'America/Los_Angeles',hour:'numeric',minute:'numeric',second:'numeric',hour12:false}).formatToParts(now);
  var h=parseInt(tparts.find(function(p){return p.type==='hour';}).value)%12;
  var m=parseInt(tparts.find(function(p){return p.type==='minute';}).value);
  var s=parseInt(tparts.find(function(p){return p.type==='second';}).value);
  var tzName=new Intl.DateTimeFormat('en-US',{timeZone:'America/Los_Angeles',timeZoneName:'short'}).formatToParts(now).find(function(p){return p.type==='timeZoneName';}).value;
  var tzOffset=tzName==='PDT'?'UTC-7':'UTC-8';
  var tzEl=document.getElementById('tz-label');
  if(tzEl)tzEl.textContent=tzName+' · '+tzOffset;
  var cx=93,cy=93,r=80;
  ctx.clearRect(0,0,186,186);

  ctx.beginPath();ctx.arc(cx+2,cy+2,r+8,0,2*Math.PI);
  ctx.fillStyle='rgba(0,0,0,0.13)';ctx.fill();

  var bezGrad=ctx.createLinearGradient(cx-r-8,cy-r-8,cx+r+8,cy+r+8);
  bezGrad.addColorStop(0,'#e8c84a');
  bezGrad.addColorStop(0.2,'#f7e48a');
  bezGrad.addColorStop(0.5,'#c8a428');
  bezGrad.addColorStop(0.75,'#f0d060');
  bezGrad.addColorStop(1,'#a07818');
  ctx.beginPath();ctx.arc(cx,cy,r+8,0,2*Math.PI);ctx.fillStyle=bezGrad;ctx.fill();

  ctx.beginPath();ctx.arc(cx,cy,r+1,0,2*Math.PI);
  ctx.strokeStyle='#7a5c10';ctx.lineWidth=1.5;ctx.stroke();

  var dialGrad=ctx.createRadialGradient(cx-15,cy-15,3,cx,cy,r);
  dialGrad.addColorStop(0,'#fffff8');
  dialGrad.addColorStop(0.4,'#faf8f0');
  dialGrad.addColorStop(1,'#e6e2d4');
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.fillStyle=dialGrad;ctx.fill();

  for(var i=0;i<60;i++){
    if(i%5!==0){
      var a=(i*6-90)*Math.PI/180;
      ctx.beginPath();ctx.arc(cx+(r-5)*Math.cos(a),cy+(r-5)*Math.sin(a),0.9,0,2*Math.PI);
      ctx.fillStyle='rgba(30,25,20,0.35)';ctx.fill();
    }
  }

  var subR=15,subDist=42;
  var subs=[{x:cx-subDist,y:cy},{x:cx,y:cy+subDist},{x:cx+subDist,y:cy}];
  subs.forEach(function(sd){
    ctx.beginPath();ctx.arc(sd.x,sd.y,subR,0,2*Math.PI);
    ctx.fillStyle='#1c1c1c';ctx.fill();
    ctx.beginPath();ctx.arc(sd.x,sd.y,subR-1,0,2*Math.PI);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.8;ctx.stroke();
    for(var t=0;t<12;t++){
      var ta=(t*30-90)*Math.PI/180;
      ctx.beginPath();
      ctx.moveTo(sd.x+(subR-4)*Math.cos(ta),sd.y+(subR-4)*Math.sin(ta));
      ctx.lineTo(sd.x+(subR-2)*Math.cos(ta),sd.y+(subR-2)*Math.sin(ta));
      ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=0.7;ctx.stroke();
    }
  });

  var secInSubA=s*6*Math.PI/180;
  ctx.save();ctx.translate(subs[0].x,subs[0].y);ctx.rotate(secInSubA);
  ctx.strokeStyle='#ffffff';ctx.lineWidth=0.9;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,4);ctx.lineTo(0,-10);ctx.stroke();
  ctx.restore();

  subs.forEach(function(sd){
    ctx.beginPath();ctx.arc(sd.x,sd.y,1.5,0,2*Math.PI);
    ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fill();
  });

  for(var i=1;i<12;i++){
    if(i===3||i===6||i===9) continue;
    var a=(i*30-90)*Math.PI/180;
    ctx.save();
    ctx.translate(cx+(r-12)*Math.cos(a),cy+(r-12)*Math.sin(a));
    ctx.rotate(a+Math.PI/2);
    ctx.fillStyle='#1c1c1c';
    ctx.fillRect(-2.5,-8,5,16);
    ctx.fillStyle='rgba(250,248,230,0.5)';
    ctx.fillRect(-1,-6,2,12);
    ctx.restore();
  }

  ctx.font='bold 13px serif';
  ctx.fillStyle='#1c1c1c';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('♛',cx,cy-57);

  ctx.font='bold 8.5px "Times New Roman",Georgia,serif';
  ctx.fillStyle='#1c1c1c';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('ROLEX',cx,cy-43);

  ctx.font='5px "Times New Roman",Georgia,serif';
  ctx.fillStyle='rgba(28,22,18,0.72)';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('OYSTER PERPETUAL',cx,cy-34);

  ctx.font='bold 5px "Times New Roman",Georgia,serif';
  ctx.fillStyle='rgba(28,22,18,0.65)';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('COSMOGRAPH DAYTONA',cx,cy+12);

  var hA=(h+m/60+s/3600)*30*Math.PI/180;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(hA);
  ctx.fillStyle='#1c1c1c';
  ctx.beginPath();
  ctx.moveTo(-3,9);ctx.lineTo(-3.5,-20);ctx.lineTo(-1.5,-40);ctx.lineTo(0,-43);ctx.lineTo(1.5,-40);ctx.lineTo(3.5,-20);ctx.lineTo(3,9);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(252,249,230,0.55)';
  ctx.fillRect(-1.2,-36,2.4,16);
  ctx.restore();

  var mA=(m+s/60)*6*Math.PI/180;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(mA);
  ctx.fillStyle='#1c1c1c';
  ctx.beginPath();
  ctx.moveTo(-2.5,9);ctx.lineTo(-2.5,-24);ctx.lineTo(-1,-60);ctx.lineTo(0,-63);ctx.lineTo(1,-60);ctx.lineTo(2.5,-24);ctx.lineTo(2.5,9);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(252,249,230,0.55)';
  ctx.fillRect(-1,-54,2,20);
  ctx.restore();

  var sA=s*6*Math.PI/180;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(sA);
  ctx.strokeStyle='#dc2626';ctx.lineWidth=1.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,12);ctx.lineTo(0,-68);ctx.stroke();
  ctx.beginPath();ctx.arc(0,6,3,0,2*Math.PI);ctx.fillStyle='#dc2626';ctx.fill();
  ctx.restore();

  ctx.beginPath();ctx.arc(cx,cy,5,0,2*Math.PI);
  ctx.fillStyle='#1c1c1c';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,3,0,2*Math.PI);
  ctx.fillStyle='#e8c84a';ctx.fill();

  document.getElementById('date').textContent=new Intl.DateTimeFormat('en-US',{timeZone:'America/Los_Angeles',weekday:'long',month:'long',day:'numeric',year:'numeric'}).format(now);
}
drawClock();setInterval(drawClock,1000);

function drawSPXChart(points,isUp){
  var canvas=document.getElementById('spx-chart');
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  var minV=Math.min.apply(null,points);
  var maxV=Math.max.apply(null,points);
  var range=maxV-minV||1;
  var pt=6,pb=6,pl=4,pr=4;
  var W2=W-pl-pr,H2=H-pt-pb;
  var color=isUp?'#16a34a':'#dc2626';
  var n=points.length;

  var grad=ctx.createLinearGradient(0,pt,0,H-pb);
  grad.addColorStop(0,isUp?'rgba(22,163,74,0.18)':'rgba(220,38,38,0.18)');
  grad.addColorStop(1,'rgba(255,255,255,0)');

  ctx.beginPath();
  for(var i=0;i<n;i++){
    var x=pl+(i/(n-1))*W2;
    var y=pt+(1-(points[i]-minV)/range)*H2;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  var lpx=pl+W2;
  var lpy=pt+(1-(points[n-1]-minV)/range)*H2;
  ctx.lineTo(lpx,H-pb);
  ctx.lineTo(pl,H-pb);
  ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();
  for(var i=0;i<n;i++){
    var x=pl+(i/(n-1))*W2;
    var y=pt+(1-(points[i]-minV)/range)*H2;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  ctx.beginPath();ctx.arc(lpx,lpy,3,0,2*Math.PI);
  ctx.fillStyle=color;ctx.fill();
}

function loadSPX(){
  var yurl='https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?interval=5m&range=1d';
  fetch('https://corsproxy.io/?url='+encodeURIComponent(yurl))
  .then(function(r){return r.json();})
  .then(function(data){
    var result=data.chart&&data.chart.result&&data.chart.result[0];
    if(!result) throw new Error('no data');
    var meta=result.meta;
    var price=meta.regularMarketPrice||meta.chartPreviousClose;
    var prev=meta.previousClose||meta.chartPreviousClose;
    var chg=price-prev;
    var pct=(chg/prev)*100;
    document.getElementById('spx-price').textContent=price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    var cel=document.getElementById('spx-change');
    cel.textContent=(chg>=0?'+':'')+chg.toFixed(2)+' ('+(pct>=0?'+':'')+pct.toFixed(2)+'%)';
    cel.style.color=chg>=0?'#16a34a':'#dc2626';
    if(meta.regularMarketDayLow) document.getElementById('spx-low').textContent='L: '+meta.regularMarketDayLow.toFixed(2);
    if(meta.regularMarketDayHigh) document.getElementById('spx-high').textContent='H: '+meta.regularMarketDayHigh.toFixed(2);
    var closes=(result.indicators&&result.indicators.quote[0])?result.indicators.quote[0].close:[];
    var pts=[];
    for(var i=0;i<closes.length;i++){if(closes[i]!=null) pts.push(closes[i]);}
    if(pts.length>1) drawSPXChart(pts,chg>=0);
  })
  .catch(function(){
    document.getElementById('spx-change').textContent='Market data unavailable';
    document.getElementById('spx-change').style.color='#9ca3af';
  });
}
loadSPX();
setInterval(loadSPX,60000);

fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard')
.then(function(r){return r.json();}).then(function(data){
  var events=data.events||[];
  var game=null;
  for(var i=0;i<events.length;i++){
    var comps=events[i].competitions[0].competitors;
    for(var j=0;j<comps.length;j++){if(comps[j].team.abbreviation==='LAD'){game=events[i];break;}}
    if(game)break;
  }
  var el=document.getElementById('dodgers-content');
  if(!game){el.innerHTML='<div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px 0">No game today</div>';return;}
  var comp=game.competitions[0];
  var away=comp.competitors[0].homeAway==='away'?comp.competitors[0]:comp.competitors[1];
  var home=comp.competitors[0].homeAway==='home'?comp.competitors[0]:comp.competitors[1];
  var lad=away.team.abbreviation==='LAD'?away:home;
  var opp=away.team.abbreviation==='LAD'?home:away;
  var ladRecord=(lad.records&&lad.records[0])?lad.records[0].summary:'';
  var oppRecord=(opp.records&&opp.records[0])?opp.records[0].summary:'';
  var awayRecord=away.team.abbreviation==='LAD'?ladRecord:oppRecord;
  var homeRecord=away.team.abbreviation==='LAD'?oppRecord:ladRecord;
  var status=comp.status.type;
  var badge='';
  if(status.completed){
    var won=parseInt(lad.score)>parseInt(opp.score);
    badge='<div style="text-align:center;margin-bottom:6px"><span class="result-badge '+(won?'win':'loss')+'">'+(won?'WIN':'LOSS')+'</span></div>';
  }
  el.innerHTML='<div class="game-teams">'+
    '<div class="team"><img class="team-logo" src="'+away.team.logo+'" onerror="this.style.display=\'none\'"><div class="team-abbr">'+away.team.abbreviation+'</div>'+(awayRecord?'<div class="team-record">'+awayRecord+'</div>':'')+'</div>'+
    '<div class="vs-scores"><div class="score-line"><span class="score-num">'+away.score+'</span><span class="score-sep">&ndash;</span><span class="score-num">'+home.score+'</span></div></div>'+
    '<div class="team"><img class="team-logo" src="'+home.team.logo+'" onerror="this.style.display=\'none\'"><div class="team-abbr">'+home.team.abbreviation+'</div>'+(homeRecord?'<div class="team-record">'+homeRecord+'</div>':'')+'</div>'+
    '</div>'+badge+'<div class="game-status">'+status.shortDetail+'</div>';
}).catch(function(){document.getElementById('dodgers-content').innerHTML='<div style="color:#9ca3af;font-size:12px">Score unavailable</div>';});

function loadScores(){
  var sports=[
    {s:'basketball',l:'nba',label:'NBA'},
    {s:'baseball',l:'mlb',label:'MLB'}
  ];
  var sportsP=Promise.all(sports.map(function(cfg){
    return Promise.all([
      fetch('https://site.api.espn.com/apis/site/v2/sports/'+cfg.s+'/'+cfg.l+'/scoreboard').then(function(r){return r.json();}).catch(function(){return {events:[]};}),
      fetch('https://site.api.espn.com/apis/site/v2/sports/'+cfg.s+'/'+cfg.l+'/news?limit=2').then(function(r){return r.json();}).catch(function(){return {articles:[]};})
    ]).then(function(res){return {cfg:cfg,events:res[0].events||[],articles:res[1].articles||[]};});
  }));
  var breakingP=fetch('https://api.codetabs.com/v1/proxy/?quest=https://www.espn.com/espn/latestnews').then(function(r){return r.text();}).then(function(html){
    var nfl=[],mlb=[],nba=[];
    var re=/href="https:\/\/www\.espn\.com\/(nfl|mlb|nba)\/story\/[^"]*"[^>]*>([^<]{15,})<\/a>/g;
    var m;
    while((m=re.exec(html))!==null){
      var sport=m[1],title=m[2].trim(),tl=title.toLowerCase();
      var soft=title[0]==='\''||title[0]==='"'||tl.includes('stomping ground')||tl.includes('return to old')||tl.includes('latest star to')||tl.includes('looking back')||tl.includes('looks back')||tl.includes('throwback')||tl.includes('disguise')||tl.includes('mayor')||tl.includes('bedtime')||tl.includes('sentenced')||tl.includes('logo court')||tl.includes('sportswear')||tl.includes('co-founder')||tl.includes('reminisce')||tl.includes('old days');
      if(soft)continue;
      if(sport==='nfl'&&nfl.length<2)nfl.push(title);
      else if(sport==='mlb'&&mlb.length<2)mlb.push(title);
      else if(sport==='nba'&&nba.length<2)nba.push(title);
      if(nfl.length>=2&&mlb.length>=2&&nba.length>=2)break;
    }
    return {nfl:nfl,mlb:mlb,nba:nba};
  }).catch(function(){return {nfl:[],mlb:[],nba:[]};});
  Promise.all([sportsP,breakingP]).then(function(outer){
    var all=outer[0],news=outer[1];
    var html='';
    all.forEach(function(sd){
      html+='<div class="sport-section"><div class="sport-lbl">'+sd.cfg.label+'</div>';
      var evs=sd.events.slice().sort(function(a,b){
        var ord={in:0,post:1,pre:2};
        var sa=a.competitions[0].status.type.state||'pre';
        var sb=b.competitions[0].status.type.state||'pre';
        return (ord[sa]!==undefined?ord[sa]:2)-(ord[sb]!==undefined?ord[sb]:2);
      }).slice(0,3);
      if(evs.length>0){
        evs.forEach(function(ev){
          var comp=ev.competitions[0];
          var cs=comp.competitors;
          var away=cs[0].homeAway==='away'?cs[0]:cs[1];
          var home=cs[0].homeAway==='home'?cs[0]:cs[1];
          var st=comp.status.type;
          var awayW=st.completed&&parseInt(away.score||0)>parseInt(home.score||0);
          var homeW=st.completed&&parseInt(home.score||0)>parseInt(away.score||0);
          html+='<div class="sg-row"><div class="sg-main">';
          if(st.state==='pre'){
            html+='<span class="sg-abbr">'+away.team.abbreviation+'</span><span class="sg-at">@</span><span class="sg-abbr">'+home.team.abbreviation+'</span>';
          } else {
            html+='<span class="sg-abbr'+(awayW?' sg-abbr-w':'')+'">'+away.team.abbreviation+'</span>';
            html+='<span class="sg-num">'+(away.score||'0')+'</span><span class="sg-dot">·</span><span class="sg-num">'+(home.score||'0')+'</span>';
            html+='<span class="sg-abbr'+(homeW?' sg-abbr-w':'')+'">'+home.team.abbreviation+'</span>';
          }
          html+='</div><div class="sg-right">';
          if(st.state==='in'){
            html+='<span class="sg-badge sg-live">LIVE</span><div class="sg-detail">'+st.shortDetail+'</div>';
          } else if(st.completed){
            html+='<span class="sg-badge sg-final">FINAL</span>';
          } else {
            html+='<span class="sg-badge sg-sched">'+(st.shortDetail||'TBD')+'</span>';
          }
          html+='</div></div>';
        });
      } else {
        var arts=sd.articles;
        if(arts[0]&&arts[0].headline){
          html+='<div class="sg-news-tag">LATEST</div><div class="sg-news-hl">'+arts[0].headline+'</div>';
          if(arts[1]&&arts[1].headline)html+='<div class="sg-news-hl" style="color:#6b7280;margin-top:4px">'+arts[1].headline+'</div>';
        } else {
          html+='<div style="color:#9ca3af;font-size:11px">Off-season</div>';
        }
      }
      html+='</div>';
    });
    html+='<div class="sport-section"><div class="sport-lbl">Latest News</div>';
    var newsSections=[{key:'nfl',label:'NFL'},{key:'mlb',label:'MLB'},{key:'nba',label:'NBA'}];
    var hasAny=false;
    newsSections.forEach(function(sec){
      var items=news[sec.key]||[];
      if(items.length){
        hasAny=true;
        html+='<div class="sport-lbl" style="margin-top:8px;letter-spacing:1px">'+sec.label+'</div>';
        items.forEach(function(h){html+='<div class="sg-bullet">'+h+'</div>';});
      }
    });
    if(!hasAny)html+='<div style="color:#9ca3af;font-size:11px">Unavailable</div>';
    html+='</div>';
    document.getElementById('scores-content').innerHTML=html;
  }).catch(function(){document.getElementById('scores-content').innerHTML='<div style="color:#9ca3af;font-size:12px">Scores unavailable</div>';});
}
loadScores();
setInterval(loadScores,60000);
</script>
</body>
</html>
