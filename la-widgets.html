<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA Weather and Time</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1b2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; gap: 16px; flex-wrap: wrap; padding: 16px; }
.card { background: #16213e; border-radius: 16px; padding: 24px; color: #fff; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #8892b0; margin-bottom: 12px; }
.weather-main { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.weather-icon { font-size: 48px; line-height: 1; }
.temp { font-size: 52px; font-weight: 700; letter-spacing: -2px; }
.condition { font-size: 14px; color: #a8b2d8; margin-bottom: 20px; text-transform: capitalize; }
.forecast { display: flex; justify-content: space-between; border-top: 1px solid #0f3460; padding-top: 16px; }
.day { text-align: center; flex: 1; }
.day-name { font-size: 11px; color: #8892b0; letter-spacing: 1px; margin-bottom: 6px; }
.day-icon { font-size: 20px; margin-bottom: 4px; }
.day-hi { color: #ccd6f6; font-weight: 600; font-size: 12px; }
.day-lo { color: #6272a4; margin-left: 3px; font-size: 12px; }
.time-display { font-size: 52px; font-weight: 700; letter-spacing: -2px; font-variant-numeric: tabular-nums; line-height: 1; }
.ampm { font-size: 18px; font-weight: 400; color: #8892b0; vertical-align: super; margin-left: 4px; }
.date-display { font-size: 13px; color: #8892b0; margin-top: 10px; }
.tz { font-size: 11px; color: #4a5568; margin-top: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Los Angeles Weather</div>
  <div class="weather-main"><div class="weather-icon" id="icon">...</div><div class="temp" id="temp">--</div></div>
  <div class="condition" id="condition">Loading...</div>
  <div class="forecast" id="forecast"></div>
</div>
<div class="card">
  <div class="label">Los Angeles Time</div>
  <div class="time-display"><span id="hm">--:--</span><span class="ampm" id="ampm">--</span></div>
  <div class="date-display" id="date">Loading...</div>
  <div class="tz">PDT - UTC-7</div>
</div>
<script>
const WMO={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
const EMOJI={0:'sunny',1:'partly',2:'cloudy',3:'overcast',45:'fog',48:'fog',51:'rain',53:'rain',55:'rain',61:'rain',63:'rain',65:'rain',71:'snow',73:'snow',75:'snow',80:'rain',81:'rain',82:'storm',95:'storm',96:'storm',99:'storm'};
const EM={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'❄️',73:'❄️',75:'❄️',80:'🌦',81:'🌦',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
fetch('https://api.open-meteo.com/v1/forecast?latitude=34.0522&longitude=-118.2437&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles&forecast_days=4')
.then(r=>r.json()).then(d=>{
  const cur=d.current,code=cur.weather_code;
  document.getElementById('icon').textContent=EM[code]||'🌡';
  document.getElementById('temp').textContent=Math.round(cur.temperature_2m)+'°F';
  document.getElementById('condition').textContent=WMO[code]||'Unknown';
  const fc=d.daily;let out='';
  for(let i=1;i<4;i++){const day=new Date(fc.time[i]+'T12:00:00');out+='<div class="day"><div class="day-name">'+DAYS[day.getDay()]+'</div><div class="day-icon">'+(EM[fc.weather_code[i]]||'🌡')+'</div><div><span class="day-hi">'+Math.round(fc.temperature_2m_max[i])+'°</span><span class="day-lo">'+Math.round(fc.temperature_2m_min[i])+'°</span></div></div>';}
  document.getElementById('forecast').innerHTML=out;
}).catch(()=>{document.getElementById('condition').textContent='Weather unavailable';});
function tick(){const now=new Date();const p=new Intl.DateTimeFormat('en-US',{timeZone:'America/Los_Angeles',hour:'numeric',minute:'2-digit',hour12:true}).formatToParts(now);document.getElementById('hm').textContent=p.find(x=>x.type==='hour').value+':'+p.find(x=>x.type==='minute').value;document.getElementById('ampm').textContent=p.find(x=>x.type==='dayPeriod').value;document.getElementById('date').textContent=new Intl.DateTimeFormat('en-US',{timeZone:'America/Los_Angeles',weekday:'long',month:'long',day:'numeric',year:'numeric'}).format(now);}
tick();setInterval(tick,1000);
</script>
</body>
</html>
